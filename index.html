/*
  AI Security Maturity — Self-Assessment
  A mockup of the interactive, self-scoring version of the Level 0–3 maturity model.

  How scoring works:
   - Fourteen questions — two per capability domain from the book.
   - Each answer maps to a level 0–3; a domain's level is the floor of its two answers.
   - Overall level = floor of the average across all questions (stable, fair headline).
   - The weakest domain is surfaced as the gap to fix first — because in security
     you're realistically only as mature as your weakest link. That per-domain
     scoring is also what a single linear ladder can't capture.

  Drop in real branding + a results endpoint to capture emails and aggregate
  "X% of orgs land at Level 0" — the distribution strip below is illustrative.
*/

function Gauge({ level, height = 10, gap = 5, animate = true }) {
  return (
    <div style={{ display: "flex", gap, width: "100%" }}>
      {[0, 1, 2, 3].map((i) => {
        const on = i <= level;
        return (
          <div
            key={i}
            style={{
              flex: 1,
              height,
              borderRadius: 3,
              background: on ? LV[level].color : C.dim,
              boxShadow: on ? `0 0 12px ${LV[level].color}40` : "none",
              transition: animate ? "background .45s ease, box-shadow .45s ease" : "none",
              transitionDelay: animate ? `${i * 80}ms` : "0ms",
            }}
          />
        );
      })}
    </div>
  );
}

                      key={opt.level}
                      className="mm-opt"
                      onClick={() => choose(opt.level)}
                      style={{
                        textAlign: "left",
                        display: "flex",
                        alignItems: "flex-start",
                        gap: 12,
                        background: sel ? C.cardHi : C.card,
                        border: `1px solid ${sel ? C.teal : C.line}`,
                        borderRadius: 11,
                        padding: "13px 15px",
                        cursor: "pointer",
                        color: C.text,
                        fontFamily: C.sans,
                        fontSize: 14,
                        lineHeight: 1.4,
                        transition: "border-color .15s ease, background .15s ease",
                      }}
                    >
                      <span style={{ width: 18, height: 18, borderRadius: "50%", flexShrink: 0, marginTop: 1, border: `2px solid ${sel ? C.teal : C.line}`, display: "flex", alignItems: "center", justifyContent: "center", background: sel ? C.teal : "transparent" }}>
                        {sel && <Check size={11} strokeWidth={3.5} color="#04201d" />}
                      </span>
                      <span>{opt.label}</span>
                    </button>
                  );
                })}
              </div>

              <button onClick={back} style={{ marginTop: 20, display: "inline-flex", alignItems: "center", gap: 6, background: "none", border: "none", color: C.muted, fontSize: 13.5, cursor: "pointer", fontFamily: C.sans, padding: 4 }}>
                <ChevronLeft size={16} /> Back
              </button>
            </div>
          );
        })()}

        {/* ---------------- RESULT ---------------- */}
        {screen === "result" && (
          <div className="mm-fade" style={{ padding: "26px 26px 26px" }}>
            <div style={eyebrow}>Your result</div>

            {/* hero readout */}
            <div style={{ display: "flex", alignItems: "center", gap: 18, margin: "14px 0 8px" }}>
              <div style={{ fontFamily: C.mono, fontSize: 62, fontWeight: 700, lineHeight: 0.9, color: lv.color }}>{overall}</div>
              <div style={{ minWidth: 0 }}>
                <div style={{ fontFamily: C.mono, fontSize: 11, letterSpacing: 2, color: C.faint, textTransform: "uppercase" }}>Level</div>
                <div style={{ fontSize: 25, fontWeight: 680, color: lv.color, letterSpacing: -0.3 }}>{lv.name}</div>
              </div>
            </div>
            <div style={{ margin: "10px 0 14px" }}><Gauge level={overall} height={12} /></div>
            <p style={{ fontSize: 15.5, lineHeight: 1.45, fontWeight: 560, margin: "0 0 6px" }}>{lv.verdict}</p>
            <p style={{ fontSize: 13.5, color: C.muted, lineHeight: 1.5, margin: "0 0 4px" }}>{lv.summary}</p>
            <p style={{ fontSize: 12, color: C.faint, lineHeight: 1.5, margin: "8px 0 0" }}>
              Overall level is the floor of your {avg.toFixed(1)}/3 average. In security you're realistically only as strong as your weakest domain — so start there.
            </p>

            {/* per-domain breakdown */}
            <div style={{ marginTop: 22, paddingTop: 18, borderTop: `1px solid ${C.line2}` }}>
              <div style={{ ...eyebrow, color: C.muted, marginBottom: 12 }}>By domain</div>
              <div style={{ display: "flex", flexDirection: "column", gap: 11 }}>
                {domains.map((d) => {
                  const isGap = d.domain === weakest.domain;
                  const Icon = d.icon;
                  return (
                    <div key={d.domain} style={{ display: "flex", alignItems: "center", gap: 12 }}>
                      <Icon size={15} color={isGap ? LV[d.level].color : C.faint} strokeWidth={2} style={{ flexShrink: 0 }} />
                      <div style={{ width: 130, flexShrink: 0, fontSize: 13, color: isGap ? C.text : C.muted, fontWeight: isGap ? 600 : 400 }}>
                        {d.domain}
                        {isGap && <span style={{ fontFamily: C.mono, fontSize: 10, color: LV[d.level].color, marginLeft: 6, letterSpacing: 0.5 }}>GAP</span>}
                      </div>
                      <div style={{ flex: 1 }}><Gauge level={d.level} height={7} animate={false} /></div>
                      <span style={{ fontFamily: C.mono, fontSize: 12, color: LV[d.level].color, width: 22, textAlign: "right", flexShrink: 0 }}>L{d.level}</span>
                    </div>
                  );
                })}
              </div>
            </div>

            {/* gap callout */}
            <div style={{ marginTop: 20, background: C.card, border: `1px solid ${C.line}`, borderLeft: `3px solid ${LV[weakest.level].color}`, borderRadius: 10, padding: "14px 16px" }}>
              <div style={{ fontFamily: C.mono, fontSize: 11, letterSpacing: 1, color: LV[weakest.level].color, textTransform: "uppercase", marginBottom: 6 }}>
                Fix first · {weakest.domain}
              </div>
              <p style={{ fontSize: 13.5, color: C.text, lineHeight: 1.5, margin: 0 }}>
                Your lowest-scoring domain is dragging your whole posture. It's the cheapest place to buy a level.
              </p>
            </div>

            {/* next steps */}
            {overall < 3 ? (
              <div style={{ marginTop: 20 }}>
                <div style={{ ...eyebrow, color: C.muted, marginBottom: 12, display: "flex", alignItems: "center", gap: 8 }}>
                  Climb to Level {overall + 1} · {LV[overall + 1].name}
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: 9 }}>
                  {lv.next.map((step, i) => (
                    <div key={i} style={{ display: "flex", gap: 11, alignItems: "flex-start" }}>
                      <span style={{ fontFamily: C.mono, fontSize: 12, color: LV[overall + 1].color, marginTop: 1, flexShrink: 0 }}>{String(i + 1).padStart(2, "0")}</span>
                      <span style={{ fontSize: 13.5, color: C.muted, lineHeight: 1.5 }}>{step}</span>
                    </div>
                  ))}
                </div>
              </div>
            ) : (
              <div style={{ marginTop: 20 }}>
                <div style={{ ...eyebrow, color: C.muted, marginBottom: 12, display: "inline-flex", alignItems: "center", gap: 8 }}>
                  <Crosshair size={14} color={lv.color} /> What comes next
                </div>
                <div style={{ display: "flex", flexDirection: "column", gap: 9 }}>
                  {lv.next.map((step, i) => (
                    <div key={i} style={{ display: "flex", gap: 11, alignItems: "flex-start" }}>
                      <span style={{ fontFamily: C.mono, fontSize: 12, color: lv.color, marginTop: 1, flexShrink: 0 }}>{String(i + 1).padStart(2, "0")}</span>
                      <span style={{ fontSize: 13.5, color: C.muted, lineHeight: 1.5 }}>{step}</span>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* benchmark (illustrative) */}
            <div style={{ marginTop: 22, paddingTop: 18, borderTop: `1px solid ${C.line2}` }}>
              <div style={{ display: "flex", justifyContent: "space-between", alignItems: "baseline", marginBottom: 10 }}>
                <span style={{ ...eyebrow, color: C.muted }}>Where orgs land</span>
                <span style={{ fontFamily: C.mono, fontSize: 10.5, color: C.faint, letterSpacing: 0.5 }}>illustrative data</span>
              </div>
              <div style={{ display: "flex", gap: 4, height: 30 }}>
                {BENCHMARK.map((b) => {
                  const here = b.lvl === overall;
                  return (
                    <div key={b.lvl} style={{ flexBasis: `${b.pct}%`, position: "relative" }}>
                      <div style={{ height: "100%", borderRadius: 5, background: here ? LV[b.lvl].color : `${LV[b.lvl].color}33`, border: here ? `1px solid ${LV[b.lvl].color}` : "1px solid transparent", display: "flex", alignItems: "center", justifyContent: "center", fontFamily: C.mono, fontSize: 11, fontWeight: 700, color: here ? "#04201d" : LV[b.lvl].color }}>
                        {b.pct}%
                      </div>
                      {here && <div style={{ position: "absolute", top: -16, left: 0, right: 0, textAlign: "center", fontFamily: C.mono, fontSize: 9.5, letterSpacing: 1, color: LV[b.lvl].color }}>YOU</div>}
                    </div>
                  );
                })}
              </div>
              <div style={{ display: "flex", gap: 4, marginTop: 5 }}>
                {BENCHMARK.map((b) => (
                  <div key={b.lvl} style={{ flexBasis: `${b.pct}%`, textAlign: "center", fontFamily: C.mono, fontSize: 9.5, color: C.faint }}>L{b.lvl}</div>
                ))}
              </div>
            </div>

            {/* actions */}
            <div style={{ display: "flex", gap: 10, marginTop: 24, flexWrap: "wrap" }}>
              <button onClick={copyResult} style={{ display: "inline-flex", alignItems: "center", gap: 8, background: copied ? `${C.teal}22` : C.teal, color: copied ? C.teal : "#04201d", border: copied ? `1px solid ${C.teal}` : "none", borderRadius: 10, padding: "11px 18px", fontSize: 14, fontWeight: 700, cursor: "pointer", fontFamily: C.sans }}>
                {copied ? <><Check size={16} strokeWidth={3} /> Copied</> : <><Copy size={15} /> Copy my result</>}
              </button>
              <button onClick={restart} style={{ display: "inline-flex", alignItems: "center", gap: 8, background: "none", color: C.muted, border: `1px solid ${C.line}`, borderRadius: 10, padding: "11px 18px", fontSize: 14, fontWeight: 600, cursor: "pointer", fontFamily: C.sans }}>
                <RotateCcw size={15} /> Retake
              </button>
            </div>
          </div>
        )}

        {/* footer */}
        <div style={{ padding: "13px 22px", borderTop: `1px solid ${C.line2}`, textAlign: "center" }}>
          <span style={{ fontSize: 11.5, color: C.faint }}>Based on the AI Security Maturity Model · </span>
          <span style={{ fontSize: 11.5, color: C.muted }}>Thrive securely</span>
        </div>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));

</script>
</body>
</html>
